name: Build APM Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests websocket-client keyboard pywin32 Pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name APM apm.py

      - name: Copy config
        run: |
          copy config.ini dist\
        shell: cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.6
          name: APM v5.6
          files: |
            dist/APM.exe
            dist/config.ini
